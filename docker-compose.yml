version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nutritional_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/nutritional_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      APP_DATA_LOAD: "true"
      APP_DATA_FILE_PATH: "/app/data/통합_식품영양성분DB_음식_20230715.xlsx"
    ports:
      - "8080:8080"
    depends_on:
      - db
